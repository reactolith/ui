name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Build the app
      - run: npm run build
        env:
          GITHUB_PAGES: true

      # Generate web-types
      - run: |
          npx generate-web-types -c components/ui -p ui- -o web-types.json
          npx generate-web-types -c components/ai-elements -p ui-ai- -o web-types-ai.json
          npx generate-web-types -c app/overrides -p ui- -o web-types-ov.json
          node -e "
            const f=require('fs'),m=p=>JSON.parse(f.readFileSync(p,'utf8'));
            const u=m('web-types.json');
            u.contributions.html.elements.push(
              ...m('web-types-ai.json').contributions.html.elements,
              ...m('web-types-ov.json').contributions.html.elements
            );
            f.writeFileSync('web-types.json',JSON.stringify(u,null,2));
            ['web-types-ai.json','web-types-ov.json'].forEach(p=>f.unlinkSync(p));
          "

      # Copy web-types into build output
      - run: cp web-types.json app/dist/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
